<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第6章 内分泌 パートC｜生理学スライド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 12px}
h1{font-size:14px;color:#555;margin-bottom:16px;font-weight:400;letter-spacing:.05em}
.slide{width:100%;max-width:820px;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.10);overflow:hidden}
.hd{background:#1a3a5c;padding:14px 28px}
.hd .ch{font-size:11px;color:#7eb3d8;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.hd .tt{font-size:20px;font-weight:500;color:#fff}
.bd{padding:20px 28px 16px;background:#fff}
.sec{font-size:10px;font-weight:600;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.box{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-bottom:12px}
.row{display:block;font-size:14px;line-height:1.9;color:#222;padding:5px 0;border-bottom:1px solid #e5e7eb}
.row:last-child{border-bottom:none}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#1a3a5c;color:#fff;padding:8px 10px;font-weight:500;text-align:left;font-size:12px}
.tbl td{padding:8px 10px;border-bottom:1px solid #e5e7eb;vertical-align:top;color:#222;line-height:1.7}
.tbl tr:last-child td{border-bottom:none}
.tbl td:first-child{font-weight:600;color:#1a3a5c;white-space:nowrap;min-width:110px}
.blank{display:inline-block;min-width:72px;border-bottom:2.5px solid #1a3a5c;border-radius:3px 3px 0 0;cursor:pointer;text-align:center;padding:0 5px;transition:all .22s;position:relative;vertical-align:baseline}
.blank::after{content:"？";font-size:12px;color:#1a3a5c;opacity:.45;position:absolute;left:50%;transform:translateX(-50%)}
.blank span{visibility:hidden;font-weight:600;color:#1a3a5c;font-size:14px;opacity:0;transition:opacity .22s;display:inline-block}
.blank.on{border-bottom-color:transparent;background:rgba(26,58,92,.1);border-radius:4px;padding:1px 7px}
.blank.on::after{display:none}
.blank.on span{visibility:visible;opacity:1}
.blank:not(.on):hover{background:rgba(26,58,92,.07)}
.ctrl{display:flex;align-items:center;gap:8px;padding:10px 28px 12px;background:#f8f9fb;border-top:1px solid #e5e7eb;flex-wrap:wrap}
.btn{padding:7px 15px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#333;font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:#f0f2f5}
.btnp{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.btnp:hover{background:#15324f}
.cnt{font-size:11px;color:#888;margin-left:auto}
.nav{display:flex;align-items:center;gap:7px;padding:9px 28px 11px;background:#f8f9fb;border-top:1px solid #e5e7eb;border-radius:0 0 12px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;cursor:pointer;transition:background .18s;flex-shrink:0}
.dot.a{background:#1a3a5c}
.pg{font-size:11px;color:#888;margin-left:auto}
</style>
</head>
<body>
<h1>生理学 第6章 内分泌｜パートC：膵臓・性腺ホルモン・全体まとめ</h1>
<div class="slide">
  <div id="sc"></div>
  <div class="ctrl">
    <button class="btn" onclick="nxt()">次のカッコを開く ▶</button>
    <button class="btn" onclick="all()">すべて表示</button>
    <button class="btn" onclick="rst()">リセット</button>
    <button class="btn btnp" onclick="go(cur-1)">◀ 前へ</button>
    <button class="btn btnp" onclick="go(cur+1)">次へ ▶</button>
    <span class="cnt" id="cnt"></span>
  </div>
  <div class="nav" id="nav"></div>
</div>
<script>
const S=[
{t:"膵臓のランゲルハンス島",ch:"第6章 内分泌 ｜ 膵臓",type:"tbl",
cols:["細胞","分泌ホルモン","血糖への作用"],
rows:[
["[α細胞]","[グルカゴン]","血糖値を [上昇↑] させる"],
["[β細胞]","[インスリン]","血糖値を [低下↓] させる（唯一の血糖降下ホルモン）"],
["[δ細胞]","[ソマトスタチン]","インスリン・グルカゴンの分泌を [抑制] する"],
],
blanks:["α細胞","グルカゴン","上昇↑","β細胞","インスリン","低下↓","δ細胞","ソマトスタチン","抑制"]
},
{t:"インスリンの作用",ch:"第6章 内分泌 ｜ 膵臓",type:"p",
rows:[
{t:"インスリンは [β細胞] から分泌される唯一の [血糖降下] ホルモンである．",b:["β細胞","血糖降下"]},
{t:"[肝臓]・筋・脂肪組織へのグルコースの取り込みを促進する．",b:["肝臓"]},
{t:"肝臓での [グリコーゲン] 合成を促進し，血糖を低下させる．",b:["グリコーゲン"]},
{t:"インスリンが不足・作用不全になると [糖尿病] が生じる．",b:["糖尿病"]},
{t:"分泌刺激は [血糖値の上昇] である（食後に分泌増加）．",b:["血糖値の上昇"]},
]},
{t:"グルカゴンの作用",ch:"第6章 内分泌 ｜ 膵臓",type:"p",
rows:[
{t:"グルカゴンは [α細胞] から分泌され，血糖値を [上昇] させる．",b:["α細胞","上昇"]},
{t:"肝臓での [グリコーゲン分解] を促進し，グルコースを血中へ放出する．",b:["グリコーゲン分解"]},
{t:"肝臓での [糖新生]（アミノ酸などからのグルコース合成）も促進する．",b:["糖新生"]},
{t:"分泌刺激は [血糖値の低下] である（空腹時・運動時に分泌増加）．",b:["血糖値の低下"]},
]},
{t:"血糖調節のしくみ",ch:"第6章 内分泌 ｜ 膵臓",type:"p",
rows:[
{t:"食後：血糖値↑ → [インスリン] 分泌↑ → 血糖値を [低下↓] させる",b:["インスリン","低下↓"]},
{t:"空腹時：血糖値↓ → [グルカゴン] 分泌↑ → 血糖値を [上昇↑] させる",b:["グルカゴン","上昇↑"]},
{t:"インスリンとグルカゴンは [拮抗] 的にはたらき血糖を一定に保つ．",b:["拮抗"]},
{t:"正常な空腹時血糖値は [73〜109] mg/dLの範囲である．",b:["73〜109"]},
]},
{t:"精巣のホルモン",ch:"第6章 内分泌 ｜ 性腺",type:"p",
rows:[
{t:"精巣からは主に [アンドロゲン] が分泌される．",b:["アンドロゲン"]},
{t:"アンドロゲンの大部分は [テストステロン] である．",b:["テストステロン"]},
{t:"胎生期に [性分化] をもたらし，思春期（13〜15歳）以降に [第二次性徴] を発現させる．",b:["性分化","第二次性徴"]},
{t:"精子形成は [アンドロゲン結合タンパク質]（ABP）により促進される．",b:["アンドロゲン結合タンパク質"]},
{t:"また精巣からは [インヒビン] も分泌され，[FSH] の分泌を抑制する．",b:["インヒビン","FSH"]},
]},
{t:"卵巣のホルモン",ch:"第6章 内分泌 ｜ 性腺",type:"tbl",
cols:["ホルモン","主な作用"],
rows:[
["[エストロゲン]（E1・E2・E3）","女性の [第二次性徴] の発現・子宮内膜の増殖・[骨吸収の抑制]"],
["[プロゲステロン]","[着床] 準備・乳腺の発育促進・[妊娠] の維持"],
["[インヒビン]","[FSH] 分泌の抑制"],
],
blanks:["エストロゲン","第二次性徴","骨吸収の抑制","プロゲステロン","着床","妊娠","インヒビン","FSH"]
},
{t:"エストロゲンの作用",ch:"第6章 内分泌 ｜ 性腺",type:"p",
rows:[
{t:"卵巣および妊娠中の [胎盤] から分泌される．",b:["胎盤"]},
{t:"女性の [第二次性徴]（乳腺発育・体脂肪分布など）を発現させる．",b:["第二次性徴"]},
{t:"骨代謝では [骨吸収を抑制] し，[骨形成を維持] する（骨を守るホルモン）．",b:["骨吸収を抑制","骨形成を維持"]},
{t:"閉経後にエストロゲンが低下すると [骨粗鬆症] が生じやすくなる．",b:["骨粗鬆症"]},
{t:"成長軟骨を [抑制] して [身長増加を抑制] する作用もある．",b:["抑制","身長増加を抑制"]},
]},
{t:"6章 全体まとめ①",ch:"第6章 内分泌 ｜ 全体まとめ",type:"tbl",
cols:["内分泌腺","主なホルモン","作用のキーワード"],
rows:[
["脳下垂体前葉","GH・[TSH]・[ACTH]・FSH・LH・PRL","成長・[代謝]・生殖の調節"],
["脳下垂体後葉","[バソプレシン]・オキシトシン","水の[再吸収]・子宮収縮"],
["甲状腺","T3・T4・[カルシトニン]","[基礎代謝]↑・骨吸収↑・Ca↓"],
["副甲状腺","[パラソルモン]（PTH）","血中[Ca²⁺]↑・骨吸収促進"],
],
blanks:["TSH","ACTH","代謝","バソプレシン","再吸収","カルシトニン","基礎代謝","パラソルモン","Ca²⁺"]
},
{t:"6章 全体まとめ②",ch:"第6章 内分泌 ｜ 全体まとめ",type:"tbl",
cols:["内分泌腺","主なホルモン","作用のキーワード"],
rows:[
["副腎皮質","[コルチゾール]・[アルドステロン]","血糖↑・[Na⁺]再吸収↑・抗炎症"],
["副腎髄質","[アドレナリン]・ノルアドレナリン","[闘争・逃走] 反応・心拍数↑"],
["膵臓（ランゲルハンス島）","[インスリン]・[グルカゴン]","血糖[降下↓]・血糖[上昇↑]"],
["性腺","[テストステロン]・[エストロゲン]","[第二次性徴]・骨代謝・生殖"],
],
blanks:["コルチゾール","アルドステロン","Na⁺","アドレナリン","闘争・逃走","インスリン","グルカゴン","降下↓","上昇↑","テストステロン","エストロゲン","第二次性徴"]
}
];
let cur=0,bs=[];
function bl(id,ans){return `<span class="blank" id="${id}" onclick="rb('${id}')"><span>${ans}</span></span>`;}
function buildSlide(i){
  const s=S[i];bs=[];
  let h=`<div class="hd"><div class="ch">${s.ch}</div><div class="tt">${s.t}</div></div><div class="bd">`;
  if(s.type==="p"){
    h+=`<div class="sec">重要事項</div><div class="box">`;
    s.rows.forEach(r=>{
      let t=r.t;
      r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
      h+=`<span class="row">${t}</span>`;
    });
    h+=`</div>`;
  }else if(s.type==="tbl"){
    h+=`<div class="sec">重要事項</div><div class="box" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr>`;
    s.cols.forEach(c=>h+=`<th>${c}</th>`);
    h+=`</tr></thead><tbody>`;
    s.rows.forEach(row=>{
      h+=`<tr>`;
      row.forEach(cell=>{
        let t=cell;
        if(s.blanks)s.blanks.forEach(a=>{
          if(t.includes("["+a+"]")){const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));}
        });
        h+=`<td>${t}</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;
  document.getElementById("sc").innerHTML=h;
  upd();bldNav();
}
function rb(id){const b=bs.find(x=>x.id===id);if(b&&!b.on){b.on=true;document.getElementById(id).classList.add("on");}upd();}
function nxt(){const u=bs.find(x=>!x.on);if(u)rb(u.id);}
function all(){bs.forEach(b=>rb(b.id));}
function rst(){bs.forEach(b=>{b.on=false;const el=document.getElementById(b.id);if(el)el.classList.remove("on");});upd();}
function upd(){const d=bs.filter(x=>x.on).length;document.getElementById("cnt").textContent=d+"/"+bs.length+" 表示済み";}
function go(i){if(i>=0&&i<S.length){cur=i;buildSlide(cur);}}
function bldNav(){
  let h="";
  S.forEach((_,i)=>h+=`<div class="dot${i===cur?" a":""}" onclick="go(${i})"></div>`);
  h+=`<span class="pg">${cur+1} / ${S.length}</span>`;
  document.getElementById("nav").innerHTML=h;
}
buildSlide(0);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第13章 栄養と代謝 パートA｜生理学スライド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 12px}
h1{font-size:14px;color:#555;margin-bottom:16px;font-weight:400;letter-spacing:.05em}
.slide{width:100%;max-width:820px;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.10);overflow:hidden}
.hd{background:#3a6b2a;padding:14px 28px}
.hd .ch{font-size:11px;color:#b5d9a8;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.hd .tt{font-size:20px;font-weight:500;color:#fff}
.bd{padding:20px 28px 16px;background:#fff}
.sec{font-size:10px;font-weight:600;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.box{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-bottom:12px}
.row{display:block;font-size:14px;line-height:1.9;color:#222;padding:5px 0;border-bottom:1px solid #e5e7eb}
.row:last-child{border-bottom:none}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#3a6b2a;color:#fff;padding:8px 10px;font-weight:500;text-align:left;font-size:12px}
.tbl td{padding:8px 10px;border-bottom:1px solid #e5e7eb;vertical-align:top;color:#222;line-height:1.7}
.tbl tr:last-child td{border-bottom:none}
.tbl td:first-child{font-weight:600;color:#3a6b2a;white-space:nowrap;min-width:110px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:7px}
.tf{background:rgba(58,107,42,.12);color:#3a6b2a}
.tb{background:rgba(30,80,122,.12);color:#1e507a}
.blank{display:inline-block;min-width:72px;border-bottom:2.5px solid #3a6b2a;border-radius:3px 3px 0 0;cursor:pointer;text-align:center;padding:0 5px;transition:all .22s;position:relative;vertical-align:baseline}
.blank::after{content:"？";font-size:12px;color:#3a6b2a;opacity:.45;position:absolute;left:50%;transform:translateX(-50%)}
.blank span{visibility:hidden;font-weight:600;color:#3a6b2a;font-size:14px;opacity:0;transition:opacity .22s;display:inline-block}
.blank.on{border-bottom-color:transparent;background:rgba(58,107,42,.1);border-radius:4px;padding:1px 7px}
.blank.on::after{display:none}
.blank.on span{visibility:visible;opacity:1}
.blank:not(.on):hover{background:rgba(58,107,42,.07)}
.ctrl{display:flex;align-items:center;gap:8px;padding:10px 28px 12px;background:#f8f9fb;border-top:1px solid #e5e7eb;flex-wrap:wrap}
.btn{padding:7px 15px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#333;font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:#f0f2f5}
.btnp{background:#3a6b2a;color:#fff;border-color:#3a6b2a}
.btnp:hover{background:#2f5822}
.cnt{font-size:11px;color:#888;margin-left:auto}
.nav{display:flex;align-items:center;gap:7px;padding:9px 28px 11px;background:#f8f9fb;border-top:1px solid #e5e7eb;border-radius:0 0 12px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;cursor:pointer;transition:background .18s;flex-shrink:0}
.dot.a{background:#3a6b2a}
.pg{font-size:11px;color:#888;margin-left:auto}
</style>
</head>
<body>
<h1>生理学 第13章 栄養と代謝｜パートA：栄養素・エネルギー代謝</h1>
<div class="slide">
  <div id="sc"></div>
  <div class="ctrl">
    <button class="btn" onclick="nxt()">次のカッコを開く ▶</button>
    <button class="btn" onclick="all()">すべて表示</button>
    <button class="btn" onclick="rst()">リセット</button>
    <button class="btn btnp" onclick="go(cur-1)">◀ 前へ</button>
    <button class="btn btnp" onclick="go(cur+1)">次へ ▶</button>
    <span class="cnt" id="cnt"></span>
  </div>
  <div class="nav" id="nav"></div>
</div>
<script>
const S=[
{t:"三大栄養素と栄養素の分類",ch:"第13章 栄養と代謝 ｜ A 生体に必要な栄養素",type:"tbl",
cols:["栄養素","特徴","エネルギー供給量"],
rows:[
["[糖質]（炭水化物）","生体でもっともよく利用されるエネルギー源．主な摂取源は [デンプン]","[4] kcal/g"],
["[タンパク質]","20種類のアミノ酸で構成．体重の約 [20%] を占める","[4] kcal/g"],
["[脂質]（脂肪）","水に溶けない．必須脂肪酸・ビタミン吸収に関与","[9] kcal/g"],
["[ミネラル]（無機質）","骨・歯の成分，酵素反応の活性化など．体重の約 [4%] を占める","エネルギー源にならない"],
["[ビタミン]","正常な生理機能を維持する有機化合物．生体内でほとんど合成できない","エネルギー源にならない"],
],
blanks:["糖質","デンプン","4","タンパク質","20%","4","脂質","9","ミネラル","4%","ビタミン"]
},
{t:"糖質の分類",ch:"第13章 栄養と代謝 ｜ A 糖質",type:"tbl",
cols:["分類","特徴","代表例"],
rows:[
["[単糖類]","糖質の最小単位．それ以上分解されず [小腸] で吸収される","[グルコース]（ブドウ糖）・フルクトース・ガラクトース"],
["[二糖類]","2分子の単糖類が結合したもの","[マルトース]（麦芽糖）・[スクロース]（ショ糖）・[ラクトース]（乳糖）"],
["[多糖類]","単糖類が多数結合した高分子化合物","[デンプン]（アミロース・アミロペクチン）・食物繊維"],
],
blanks:["単糖類","小腸","グルコース","二糖類","マルトース","スクロース","ラクトース","多糖類","デンプン"]
},
{t:"タンパク質・脂質の特徴",ch:"第13章 栄養と代謝 ｜ A タンパク質・脂質",type:"two",
left:{label:"タンパク質",tag:"tf",rows:[
{t:"アミノ酸は [必須アミノ酸] と [非必須アミノ酸] に分けられる．",b:["必須アミノ酸","非必須アミノ酸"]},
{t:"必須アミノ酸は食事からの摂取が [不可欠] で，体内では合成できない．9種類ある．",b:["不可欠"]},
{t:"タンパク質は酵素・ホルモン・抗体・[収縮タンパク質]（ミオシン・アクチン）など多様なはたらきをもつ．",b:["収縮タンパク質"]},
]},
right:{label:"脂質",tag:"tb",rows:[
{t:"脂質は [遊離脂肪酸]・[トリグリセリド]（中性脂肪）・[リン脂質]・[コレステロール]・リポタンパク質などがある．",b:["遊離脂肪酸","トリグリセリド","リン脂質","コレステロール"]},
{t:"リン脂質は [細胞膜] を構成する主な成分である．",b:["細胞膜"]},
{t:"コレステロールは [ステロイドホルモン]・[胆汁酸]・ビタミンDの合成材料となる．",b:["ステロイドホルモン","胆汁酸"]},
]}},
{t:"脂溶性ビタミンと水溶性ビタミン",ch:"第13章 栄養と代謝 ｜ A ビタミン",type:"tbl",
cols:["分類","特徴","代表と主な作用"],
rows:[
["[脂溶性ビタミン]","脂質と一緒に摂取で吸収率↑・脂肪組織に蓄積・[過剰摂取] で症状が出ることがある","A（視覚・免疫）・D（Ca吸収）・E（抗酸化）・K（[血液凝固]）"],
["[水溶性ビタミン]","水に溶けやすい・調理で失われやすい・過剰分は [尿中] へ排泄される","B群（補酵素）・C（抗酸化・[コラーゲン] 合成）"],
],
blanks:["脂溶性ビタミン","過剰摂取","血液凝固","水溶性ビタミン","尿中","コラーゲン"]
},
{t:"ATPとエネルギー代謝",ch:"第13章 栄養と代謝 ｜ B エネルギー代謝",type:"p",
rows:[
{t:"生体内でのエネルギーの代謝は [ATP]（アデノシン三リン酸）を介して行われる．",b:["ATP"]},
{t:"ATPは [ADP]（アデノシン二リン酸）とリン酸へ分解されるときにエネルギーを放出し，[機械的仕事]・[化学的仕事]・[物質の輸送] に用いられる．",b:["ADP","機械的仕事","化学的仕事","物質の輸送"]},
{t:"エネルギーの測定単位は [kcal] を用いる．熱エネルギーを単位として測定できるため [熱量代謝] ともいわれる．",b:["kcal","熱量代謝"]},
]},
{t:"嫌気的代謝と好気的代謝",ch:"第13章 栄養と代謝 ｜ B エネルギー代謝",type:"two",
left:{label:"嫌気的代謝（解糖系）",tag:"tf",rows:[
{t:"[細胞質] で進行する代謝経路である．",b:["細胞質"]},
{t:"グルコースが [ピルビン酸] へ分解され，正味 [2分子] のATPが生成される．",b:["ピルビン酸","2分子"]},
{t:"酸素不足の状態ではピルビン酸が [乳酸] へ変化する．",b:["乳酸"]},
]},
right:{label:"好気的代謝",tag:"tb",rows:[
{t:"[クエン酸回路]（TCA回路）と [電子伝達系] を経てATPが生成される．",b:["クエン酸回路","電子伝達系"]},
{t:"電子伝達系では [酸化的リン酸化] が起こりATPが合成される．",b:["酸化的リン酸化"]},
{t:"1分子のグルコースからおよそ [38分子] のATPがつくられる．",b:["38分子"]},
]}},
{t:"リポタンパク質の種類",ch:"第13章 栄養と代謝 ｜ A 脂質",type:"tbl",
cols:["種類","特徴","主な役割"],
rows:[
["[カイロミクロン]","粒子径が最も [大きい]・比重が最も [低い]","小腸から吸収した脂質を全身へ運ぶ"],
["[VLDL]（超低密度）","トリグリセリドを多く含む","肝臓で合成したトリグリセリドを末梢へ"],
["[LDL]（低密度）","[コレステロール] 含有量が最も多い","コレステロールを末梢細胞へ運ぶ"],
["[HDL]（高密度）","粒子径が最も [小さい]・比重が最も [高い]","末梢のコレステロールを肝臓へ回収"],
],
blanks:["カイロミクロン","大きい","低い","VLDL","LDL","コレステロール","HDL","小さい","高い"]
},
{t:"パートAまとめ",ch:"第13章 栄養と代謝 ｜ パートAまとめ",type:"tbl",
cols:["項目","内容"],
rows:[
["三大栄養素","[糖質]（4kcal/g）・[タンパク質]（4kcal/g）・[脂質]（9kcal/g）"],
["糖質の分類","[単糖類]→[二糖類]→[多糖類]（デンプン）"],
["必須アミノ酸","[食事] からの摂取が不可欠（9種類）"],
["脂溶性ビタミン","A・D・E・K（過剰摂取に注意）"],
["水溶性ビタミン","B群・C（過剰分は [尿中] へ排泄）"],
["嫌気的代謝","解糖系→グルコース→[ピルビン酸]→[2ATP]"],
["好気的代謝","クエン酸回路＋電子伝達系→[38ATP]"],
],
blanks:["糖質","タンパク質","脂質","単糖類","二糖類","多糖類","食事","尿中","ピルビン酸","2ATP","38ATP"]
},
];
let cur=0,bs=[];
function bl(id,ans){return `<span class="blank" id="${id}" onclick="rb('${id}')"><span>${ans}</span></span>`;}
function buildSlide(i){
  const s=S[i];bs=[];
  let h=`<div class="hd"><div class="ch">${s.ch}</div><div class="tt">${s.t}</div></div><div class="bd">`;
  if(s.type==="p"){
    h+=`<div class="sec">重要事項</div><div class="box">`;
    s.rows.forEach(r=>{
      let t=r.t;
      r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
      h+=`<span class="row">${t}</span>`;
    });
    h+=`</div>`;
  }else if(s.type==="tbl"){
    h+=`<div class="sec">重要事項</div><div class="box" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr>`;
    s.cols.forEach(c=>h+=`<th>${c}</th>`);
    h+=`</tr></thead><tbody>`;
    s.rows.forEach(row=>{
      h+=`<tr>`;
      row.forEach(cell=>{
        let t=cell;
        if(s.blanks)s.blanks.forEach(a=>{
          if(t.includes("["+a+"]")){const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));}
        });
        h+=`<td>${t}</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;
  }else if(s.type==="two"){
    h+=`<div class="two">`;
    ["left","right"].forEach(side=>{
      const d=s[side];
      const tc=side==="left"?"tf":"tb";
      h+=`<div class="box"><span class="tag ${tc}">${d.label}</span>`;
      d.rows.forEach(r=>{
        let t=r.t;
        r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
        h+=`<p style="font-size:13px;line-height:1.8;border-bottom:1px solid #e5e7eb;padding:4px 0">${t}</p>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById("sc").innerHTML=h;
  upd();bldNav();
}
function rb(id){const b=bs.find(x=>x.id===id);if(b&&!b.on){b.on=true;document.getElementById(id).classList.add("on");}upd();}
function nxt(){const u=bs.find(x=>!x.on);if(u)rb(u.id);}
function all(){bs.forEach(b=>rb(b.id));}
function rst(){bs.forEach(b=>{b.on=false;const el=document.getElementById(b.id);if(el)el.classList.remove("on");});upd();}
function upd(){const d=bs.filter(x=>x.on).length;document.getElementById("cnt").textContent=d+"/"+bs.length+" 表示済み";}
function go(i){if(i>=0&&i<S.length){cur=i;buildSlide(cur);}}
function bldNav(){
  let h="";
  S.forEach((_,i)=>h+=`<div class="dot${i===cur?" a":""}" onclick="go(${i})"></div>`);
  h+=`<span class="pg">${cur+1} / ${S.length}</span>`;
  document.getElementById("nav").innerHTML=h;
}
buildSlide(0);
</script>
</body>
</html>

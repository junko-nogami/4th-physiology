<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第14章 消化と吸収 パートB｜生理学スライド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 12px}
h1{font-size:14px;color:#555;margin-bottom:16px;font-weight:400;letter-spacing:.05em}
.slide{width:100%;max-width:820px;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.10);overflow:hidden}
.hd{background:#7a4a1e;padding:14px 28px}
.hd .ch{font-size:11px;color:#e8c99a;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.hd .tt{font-size:20px;font-weight:500;color:#fff}
.bd{padding:20px 28px 16px;background:#fff}
.sec{font-size:10px;font-weight:600;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.box{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-bottom:12px}
.row{display:block;font-size:14px;line-height:1.9;color:#222;padding:5px 0;border-bottom:1px solid #e5e7eb}
.row:last-child{border-bottom:none}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#7a4a1e;color:#fff;padding:8px 10px;font-weight:500;text-align:left;font-size:12px}
.tbl td{padding:8px 10px;border-bottom:1px solid #e5e7eb;vertical-align:top;color:#222;line-height:1.7}
.tbl tr:last-child td{border-bottom:none}
.tbl td:first-child{font-weight:600;color:#7a4a1e;white-space:nowrap;min-width:110px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:7px}
.tf{background:rgba(122,74,30,.12);color:#7a4a1e}
.tb{background:rgba(30,80,122,.12);color:#1e507a}
.blank{display:inline-block;min-width:72px;border-bottom:2.5px solid #7a4a1e;border-radius:3px 3px 0 0;cursor:pointer;text-align:center;padding:0 5px;transition:all .22s;position:relative;vertical-align:baseline}
.blank::after{content:"？";font-size:12px;color:#7a4a1e;opacity:.45;position:absolute;left:50%;transform:translateX(-50%)}
.blank span{visibility:hidden;font-weight:600;color:#7a4a1e;font-size:14px;opacity:0;transition:opacity .22s;display:inline-block}
.blank.on{border-bottom-color:transparent;background:rgba(122,74,30,.1);border-radius:4px;padding:1px 7px}
.blank.on::after{display:none}
.blank.on span{visibility:visible;opacity:1}
.blank:not(.on):hover{background:rgba(122,74,30,.07)}
.ctrl{display:flex;align-items:center;gap:8px;padding:10px 28px 12px;background:#f8f9fb;border-top:1px solid #e5e7eb;flex-wrap:wrap}
.btn{padding:7px 15px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#333;font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:#f0f2f5}
.btnp{background:#7a4a1e;color:#fff;border-color:#7a4a1e}
.btnp:hover{background:#6a3f1a}
.cnt{font-size:11px;color:#888;margin-left:auto}
.nav{display:flex;align-items:center;gap:7px;padding:9px 28px 11px;background:#f8f9fb;border-top:1px solid #e5e7eb;border-radius:0 0 12px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;cursor:pointer;transition:background .18s;flex-shrink:0}
.dot.a{background:#7a4a1e}
.pg{font-size:11px;color:#888;margin-left:auto}
</style>
</head>
<body>
<h1>生理学 第14章 消化と吸収｜パートB：食物の消化と吸収</h1>
<div class="slide">
  <div id="sc"></div>
  <div class="ctrl">
    <button class="btn" onclick="nxt()">次のカッコを開く ▶</button>
    <button class="btn" onclick="all()">すべて表示</button>
    <button class="btn" onclick="rst()">リセット</button>
    <button class="btn btnp" onclick="go(cur-1)">◀ 前へ</button>
    <button class="btn btnp" onclick="go(cur+1)">次へ ▶</button>
    <span class="cnt" id="cnt"></span>
  </div>
  <div class="nav" id="nav"></div>
</div>
<script>
const S=[
{t:"口腔での消化",ch:"第14章 消化と吸収 ｜ B 口腔",type:"p",
rows:[
{t:"食物は歯で機械的に噛み砕かれる．これを [咀嚼] という．",b:["咀嚼"]},
{t:"主な唾液腺は [耳下腺]・[顎下腺]・[舌下腺] の3対である．唾液の分泌量は1日約 [1〜1.5L] である．",b:["耳下腺","顎下腺","舌下腺","1〜1.5L"]},
{t:"唾液の主要な成分は [アミラーゼ] と粘液である．アミラーゼは [デンプン] の消化を担う．",b:["アミラーゼ","デンプン"]},
{t:"唾液分泌の中枢は脳幹にある [唾液分泌中枢] である．分泌刺激は [副交感神経] と交感神経を介して起こる．",b:["唾液分泌中枢","副交感神経"]},
]},
{t:"嚥下の3段階",ch:"第14章 消化と吸収 ｜ B 口腔",type:"tbl",
cols:["段階","内容","特徴"],
rows:[
["[口腔期]","舌を使って食物を意識的に咽頭へ押しやる","[随意的] な動作"],
["[咽頭期]","咽頭の筋が収縮し食物が食道へ押し込まれる","気道が[閉鎖]され発声・呼吸は一時的に止まる"],
["[食道期]","食物が5〜8秒かけて胃へ送り込まれる","主に[蠕動運動]で起こる・重力不要"],
],
blanks:["口腔期","随意的","咽頭期","閉鎖","食道期","蠕動運動"]
},
{t:"胃の運動と胃液",ch:"第14章 消化と吸収 ｜ B 胃",type:"p",
rows:[
{t:"食事に伴い胃壁の平滑筋が弛緩する反射を [受け入れ弛緩] と呼ぶ．胃は約 [1.5L] の食物を一時的に溜め込む．",b:["受け入れ弛緩","1.5L"]},
{t:"胃では食物と胃液を混ぜ合わせて [粥状液] にし，[幽門括約筋] を通じて小腸へ少しずつ送り出す．",b:["粥状液","幽門括約筋"]},
{t:"胃液の分泌量は1日 [1〜2L] で，[脳相]・[胃相]・[腸相] の3相に分けられる．",b:["1〜2L","脳相","胃相","腸相"]},
]},
{t:"胃液の成分とはたらき",ch:"第14章 消化と吸収 ｜ B 胃",type:"tbl",
cols:["成分","分泌細胞","はたらき"],
rows:[
["[ペプシン]（前駆体：ペプシノゲン）","[主細胞]","タンパク質の化学的消化（酸性条件下で活性化）"],
["[塩酸]（pH1〜1.5）","[壁細胞]","ペプシンの活性化・殺菌作用"],
["[内因子]","[壁細胞]","[ビタミンB₁₂] と結合して回腸での吸収を助ける"],
["粘液","表在粘液細胞・顆粒粘液細胞（副細胞）","胃粘膜を[胃液] から保護する"],
],
blanks:["ペプシン","主細胞","塩酸","壁細胞","内因子","壁細胞","ビタミンB₁₂","胃液"]
},
{t:"小腸の構造と消化",ch:"第14章 消化と吸収 ｜ B 小腸",type:"p",
rows:[
{t:"小腸は最終的な消化と栄養の [吸収] が行われる場である．",b:["吸収"]},
{t:"小腸の表面には [絨毛] と呼ばれる多数の突起がある．絨毛の表面の吸収上皮細胞には [微絨毛]（刷子縁）がある．",b:["絨毛","微絨毛"]},
{t:"微絨毛の表面には [オリゴ糖分解酵素] や [ペプチド分解酵素] があり化学的消化の最終段階ではたらく．",b:["オリゴ糖分解酵素","ペプチド分解酵素"]},
{t:"吸収された栄養素の大部分は [毛細血管] に入り，[門脈] を経て肝臓を通ったのち体循環へ入る．",b:["毛細血管","門脈"]},
{t:"脂質や脂溶性ビタミンは絨毛内の [リンパ管] に入り，乳び槽→[胸管] を経て体循環へ入る．",b:["リンパ管","胸管"]},
]},
{t:"膵液と胆汁",ch:"第14章 消化と吸収 ｜ B 小腸",type:"two",
left:{label:"膵液",tag:"tf",rows:[
{t:"膵臓で産生され膵管を流れる．1日の分泌量は約 [1L] である．",b:["1L"]},
{t:"三大栄養素の消化酵素（[前駆体]）がすべて含まれる．",b:["前駆体"]},
{t:"[重炭酸イオン]（HCO₃⁻）を含むアルカリ性で，胃酸を中和する．",b:["重炭酸イオン"]},
{t:"[セクレチン] が重炭酸イオンを多く含む膵液の，[コレシストキニン] が酵素に富む膵液の分泌を促す．",b:["セクレチン","コレシストキニン"]},
]},
right:{label:"胆汁",tag:"tb",rows:[
{t:"[肝臓] で産生され，[胆嚢] で約10倍に濃縮・貯蔵される．",b:["肝臓","胆嚢"]},
{t:"1日の分泌量は約 [0.5L] である．",b:["0.5L"]},
{t:"[胆汁酸] は脂質の消化と吸収を助ける．[乳化] 作用でリパーゼをはたらきやすくする．",b:["胆汁酸","乳化"]},
{t:"[コレシストキニン] が胆嚢を収縮させて胆汁分泌を促す．",b:["コレシストキニン"]},
]}},
{t:"大腸と肝臓の機能",ch:"第14章 消化と吸収 ｜ B 大腸・肝臓",type:"p",
rows:[
{t:"大腸では [水分] が吸収され，残りかすは固形便（固形成分約[25%]）となる．便の量は1日約 [150g] である．",b:["水分","25%","150g"]},
{t:"便の固形成分の約半分は [腸内細菌] とその死骸である．",b:["腸内細菌"]},
{t:"肝臓は [胆汁] の産生のほか，栄養素の [代謝] と [解毒] を行う．",b:["胆汁","代謝","解毒"]},
{t:"消化管から吸収された栄養素を含む血液（静脈血）は体循環へ入る前に [門脈] を経て肝臓へ送られる．",b:["門脈"]},
{t:"ビリルビンは [ヘモグロビン] の代謝産物で，肝臓で処理されて [胆汁] 中に排泄される．",b:["ヘモグロビン","胆汁"]},
]},
{t:"パートBまとめ",ch:"第14章 消化と吸収 ｜ パートBまとめ",type:"tbl",
cols:["部位","主なはたらき","キーワード"],
rows:[
["口腔","咀嚼・唾液分泌・嚥下","[アミラーゼ]・[デンプン]消化"],
["胃","粥状液の形成・タンパク質消化","[ペプシン]（主細胞）・[塩酸]（壁細胞）"],
["小腸","最終消化・栄養素の吸収","[絨毛]・[微絨毛]・[門脈]・[リンパ管]"],
["膵臓","三大栄養素の消化酵素分泌","[膵液]・[重炭酸イオン]・中和"],
["胆嚢","胆汁の貯蔵・濃縮","[胆汁酸]・脂質の[乳化]"],
["大腸","水分吸収・便の形成","[腸内細菌]・固形便"],
["肝臓","代謝・解毒・胆汁産生","[門脈]・[ビリルビン]"],
],
blanks:["アミラーゼ","デンプン","ペプシン","塩酸","絨毛","微絨毛","門脈","リンパ管","膵液","重炭酸イオン","胆汁酸","乳化","腸内細菌","門脈","ビリルビン"]
},
];
let cur=0,bs=[];
function bl(id,ans){return `<span class="blank" id="${id}" onclick="rb('${id}')"><span>${ans}</span></span>`;}
function buildSlide(i){
  const s=S[i];bs=[];
  let h=`<div class="hd"><div class="ch">${s.ch}</div><div class="tt">${s.t}</div></div><div class="bd">`;
  if(s.type==="p"){
    h+=`<div class="sec">重要事項</div><div class="box">`;
    s.rows.forEach(r=>{
      let t=r.t;
      r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
      h+=`<span class="row">${t}</span>`;
    });
    h+=`</div>`;
  }else if(s.type==="tbl"){
    h+=`<div class="sec">重要事項</div><div class="box" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr>`;
    s.cols.forEach(c=>h+=`<th>${c}</th>`);
    h+=`</tr></thead><tbody>`;
    s.rows.forEach(row=>{
      h+=`<tr>`;
      row.forEach(cell=>{
        let t=cell;
        if(s.blanks)s.blanks.forEach(a=>{
          if(t.includes("["+a+"]")){const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));}
        });
        h+=`<td>${t}</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;
  }else if(s.type==="two"){
    h+=`<div class="two">`;
    ["left","right"].forEach(side=>{
      const d=s[side];
      const tc=side==="left"?"tf":"tb";
      h+=`<div class="box"><span class="tag ${tc}">${d.label}</span>`;
      d.rows.forEach(r=>{
        let t=r.t;
        r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
        h+=`<p style="font-size:13px;line-height:1.8;border-bottom:1px solid #e5e7eb;padding:4px 0">${t}</p>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById("sc").innerHTML=h;
  upd();bldNav();
}
function rb(id){const b=bs.find(x=>x.id===id);if(b&&!b.on){b.on=true;document.getElementById(id).classList.add("on");}upd();}
function nxt(){const u=bs.find(x=>!x.on);if(u)rb(u.id);}
function all(){bs.forEach(b=>rb(b.id));}
function rst(){bs.forEach(b=>{b.on=false;const el=document.getElementById(b.id);if(el)el.classList.remove("on");});upd();}
function upd(){const d=bs.filter(x=>x.on).length;document.getElementById("cnt").textContent=d+"/"+bs.length+" 表示済み";}
function go(i){if(i>=0&&i<S.length){cur=i;buildSlide(cur);}}
function bldNav(){
  let h="";
  S.forEach((_,i)=>h+=`<div class="dot${i===cur?" a":""}" onclick="go(${i})"></div>`);
  h+=`<span class="pg">${cur+1} / ${S.length}</span>`;
  document.getElementById("nav").innerHTML=h;
}
buildSlide(0);
</script>
</body>
</html>

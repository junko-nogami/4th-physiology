<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第7章 生殖 パートA｜生理学スライド</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 12px}
h1{font-size:14px;color:#555;margin-bottom:16px;font-weight:400;letter-spacing:.05em}
.slide{width:100%;max-width:820px;background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.10);overflow:hidden}
.hd{background:#2d5a3d;padding:14px 28px}
.hd .ch{font-size:11px;color:#a8d5b5;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.hd .tt{font-size:20px;font-weight:500;color:#fff}
.bd{padding:20px 28px 16px;background:#fff}
.sec{font-size:10px;font-weight:600;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.box{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-bottom:12px}
.row{display:block;font-size:14px;line-height:1.9;color:#222;padding:5px 0;border-bottom:1px solid #e5e7eb}
.row:last-child{border-bottom:none}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#2d5a3d;color:#fff;padding:8px 10px;font-weight:500;text-align:left;font-size:12px}
.tbl td{padding:8px 10px;border-bottom:1px solid #e5e7eb;vertical-align:top;color:#222;line-height:1.7}
.tbl tr:last-child td{border-bottom:none}
.tbl td:first-child{font-weight:600;color:#2d5a3d;white-space:nowrap;min-width:100px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:4px;margin-bottom:7px}
.tf{background:rgba(45,90,61,.12);color:#2d5a3d}
.tb{background:rgba(180,60,30,.12);color:#b43c1e}
.blank{display:inline-block;min-width:72px;border-bottom:2.5px solid #2d5a3d;border-radius:3px 3px 0 0;cursor:pointer;text-align:center;padding:0 5px;transition:all .22s;position:relative;vertical-align:baseline}
.blank::after{content:"？";font-size:12px;color:#2d5a3d;opacity:.45;position:absolute;left:50%;transform:translateX(-50%)}
.blank span{visibility:hidden;font-weight:600;color:#2d5a3d;font-size:14px;opacity:0;transition:opacity .22s;display:inline-block}
.blank.on{border-bottom-color:transparent;background:rgba(45,90,61,.1);border-radius:4px;padding:1px 7px}
.blank.on::after{display:none}
.blank.on span{visibility:visible;opacity:1}
.blank:not(.on):hover{background:rgba(45,90,61,.07)}
.ctrl{display:flex;align-items:center;gap:8px;padding:10px 28px 12px;background:#f8f9fb;border-top:1px solid #e5e7eb;flex-wrap:wrap}
.btn{padding:7px 15px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#333;font-size:12px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:#f0f2f5}
.btnp{background:#2d5a3d;color:#fff;border-color:#2d5a3d}
.btnp:hover{background:#244d34}
.cnt{font-size:11px;color:#888;margin-left:auto}
.nav{display:flex;align-items:center;gap:7px;padding:9px 28px 11px;background:#f8f9fb;border-top:1px solid #e5e7eb;border-radius:0 0 12px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:#d1d5db;cursor:pointer;transition:background .18s;flex-shrink:0}
.dot.a{background:#2d5a3d}
.pg{font-size:11px;color:#888;margin-left:auto}
</style>
</head>
<body>
<h1>生理学 第7章 生殖｜パートA：性分化</h1>
<div class="slide">
  <div id="sc"></div>
  <div class="ctrl">
    <button class="btn" onclick="nxt()">次のカッコを開く ▶</button>
    <button class="btn" onclick="all()">すべて表示</button>
    <button class="btn" onclick="rst()">リセット</button>
    <button class="btn btnp" onclick="go(cur-1)">◀ 前へ</button>
    <button class="btn btnp" onclick="go(cur+1)">次へ ▶</button>
    <span class="cnt" id="cnt"></span>
  </div>
  <div class="nav" id="nav"></div>
</div>
<script>
const S=[
{t:"生殖とは",ch:"第7章 生殖 ｜ 導入",type:"p",
rows:[
{t:"種の保存のために個体を再生産するはたらきを [生殖] と呼ぶ．",b:["生殖"]},
{t:"精子と卵子が [受精] すると個体が発生し，生殖器が男性か女性に分化する．",b:["受精"]},
{t:"成長して [思春期] になると，男性では [精子形成] が，女性では [排卵] が始まる．",b:["思春期","精子形成","排卵"]},
]},
{t:"遺伝的な性と性分化",ch:"第7章 生殖 ｜ A 性分化",type:"p",
rows:[
{t:"遺伝的な性は [受精時] に決まる．",b:["受精時"]},
{t:"生殖器〔[生殖腺] と [副生殖器]〕や脳は個体発生の初期には [未分化] である．",b:["生殖腺","副生殖器","未分化"]},
{t:"遺伝的な性の決定に基づいて [生殖腺] がまず分化し，その後副生殖器や脳の性分化が進む．",b:["生殖腺"]},
{t:"胎生期の性分化で生じる男女間の差異の特徴を [一次性徴] と呼ぶ．",b:["一次性徴"]},
]},
{t:"生殖腺の性分化",ch:"第7章 生殖 ｜ A 性分化",type:"tbl",
cols:["","女性","男性"],
rows:[
["生殖腺","[卵巣]","[精巣]"],
["分化のきっかけ","性決定遺伝子がなければ[卵巣]へ","[Y染色体]上の[SRY遺伝子]がはたらく"],
],
blanks:["卵巣","精巣","卵巣","Y染色体","SRY遺伝子"]
},
{t:"副生殖器の性分化（内生殖器）",ch:"第7章 生殖 ｜ A 性分化",type:"two",
left:{label:"男性型への分化",tag:"tf",rows:[
{t:"未分化の内生殖器には [ミュラー管] と [ウォルフ管] が存在する．",b:["ミュラー管","ウォルフ管"]},
{t:"精巣の [セルトリ細胞] から [ミュラー管抑制物質] が分泌される．",b:["セルトリ細胞","ミュラー管抑制物質"]},
{t:"ウォルフ管が分化して男性の内生殖器（精巣上体・[精管]）ができる．",b:["精管"]},
]},
right:{label:"女性型への分化",tag:"tb",rows:[
{t:"ミュラー管抑制物質が分泌されなければ [ミュラー管] の分化が進む．",b:["ミュラー管"]},
{t:"女性の内生殖器（[卵管]・[子宮]・膣の上部）ができる．",b:["卵管","子宮"]},
{t:"ウォルフ管は自然に [退化] する．",b:["退化"]},
]}},
{t:"副生殖器の性分化（外生殖器）",ch:"第7章 生殖 ｜ A 性分化",type:"p",
rows:[
{t:"未分化の外生殖器は，精巣の [間質細胞] から [テストステロン] が分泌されることで男性型に分化する．",b:["間質細胞","テストステロン"]},
{t:"テストステロン分泌がなければ [女性] 型に分化する．",b:["女性"]},
{t:"性染色体が [XY] でテストステロンの受容体が欠ける場合，外見が女性型を示す [アンドロゲン不応症] となる．",b:["XY","アンドロゲン不応症"]},
]},
{t:"脳の性分化",ch:"第7章 生殖 ｜ A 性分化",type:"p",
rows:[
{t:"脳は，テストステロン分泌があれば女性型への分化が阻止されて [男性] 型へと分化する．",b:["男性"]},
{t:"脳の男女差は，特に [視床下部] や [大脳辺縁系] のシナプス結合で認められる．",b:["視床下部","大脳辺縁系"]},
{t:"ヒトでは妊娠 [中期] で精巣からの大量の [テストステロン] 分泌がみられ，その時期に脳の性分化が起こると考えられる．",b:["中期","テストステロン"]},
]},
{t:"思春期の二次性徴",ch:"第7章 生殖 ｜ A 性分化",type:"two",
left:{label:"女性の二次性徴",tag:"tf",rows:[
{t:"下垂体からの [ゴナドトロピン] 分泌がさかんになる．",b:["ゴナドトロピン"]},
{t:"乳頭発育 → 恥毛出現 → 乳房発育と [初経] が現れる．",b:["初経"]},
{t:"その後 [骨端] が閉鎖し成長が止まる．",b:["骨端"]},
]},
right:{label:"男性の二次性徴",tag:"tb",rows:[
{t:"精巣・陰茎の肥大が始まり，[精子形成] が始まる．",b:["精子形成"]},
{t:"恥毛の出現 → [精通] が起こる．",b:["精通"]},
{t:"ひげの発生 → [骨端] の閉鎖で成長が止まる．",b:["骨端"]},
]}},
{t:"パートAまとめ",ch:"第7章 生殖 ｜ パートAまとめ",type:"tbl",
cols:["","一次性徴","二次性徴"],
rows:[
["時期","[胎生期]","[思春期]"],
["内容","[生殖腺・副生殖器] の性分化","[外見的] な男女差の出現"],
["調節因子","[テストステロン]・ミュラー管抑制物質","[ゴナドトロピン]・性ホルモン"],
],
blanks:["胎生期","思春期","生殖腺・副生殖器","外見的","テストステロン","ゴナドトロピン"]
},
];
let cur=0,bs=[];
function bl(id,ans){return `<span class="blank" id="${id}" onclick="rb('${id}')"><span>${ans}</span></span>`;}
function buildSlide(i){
  const s=S[i];bs=[];
  let h=`<div class="hd"><div class="ch">${s.ch}</div><div class="tt">${s.t}</div></div><div class="bd">`;
  if(s.type==="p"){
    h+=`<div class="sec">重要事項</div><div class="box">`;
    s.rows.forEach(r=>{
      let t=r.t;
      r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
      h+=`<span class="row">${t}</span>`;
    });
    h+=`</div>`;
  }else if(s.type==="tbl"){
    h+=`<div class="sec">重要事項</div><div class="box" style="padding:0;overflow:hidden"><table class="tbl"><thead><tr>`;
    s.cols.forEach(c=>h+=`<th>${c}</th>`);
    h+=`</tr></thead><tbody>`;
    s.rows.forEach(row=>{
      h+=`<tr>`;
      row.forEach(cell=>{
        let t=cell;
        if(s.blanks)s.blanks.forEach(a=>{
          if(t.includes("["+a+"]")){const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));}
        });
        h+=`<td>${t}</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;
  }else if(s.type==="two"){
    h+=`<div class="two">`;
    ["left","right"].forEach(side=>{
      const d=s[side];
      const tc=side==="left"?"tf":"tb";
      h+=`<div class="box"><span class="tag ${tc}">${d.label}</span>`;
      d.rows.forEach(r=>{
        let t=r.t;
        r.b.forEach(a=>{const id="b"+bs.length;bs.push({id,on:false});t=t.replace("["+a+"]",bl(id,a));});
        h+=`<p style="font-size:13px;line-height:1.8;border-bottom:1px solid #e5e7eb;padding:4px 0">${t}</p>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById("sc").innerHTML=h;
  upd();bldNav();
}
function rb(id){const b=bs.find(x=>x.id===id);if(b&&!b.on){b.on=true;document.getElementById(id).classList.add("on");}upd();}
function nxt(){const u=bs.find(x=>!x.on);if(u)rb(u.id);}
function all(){bs.forEach(b=>rb(b.id));}
function rst(){bs.forEach(b=>{b.on=false;const el=document.getElementById(b.id);if(el)el.classList.remove("on");});upd();}
function upd(){const d=bs.filter(x=>x.on).length;document.getElementById("cnt").textContent=d+"/"+bs.length+" 表示済み";}
function go(i){if(i>=0&&i<S.length){cur=i;buildSlide(cur);}}
function bldNav(){
  let h="";
  S.forEach((_,i)=>h+=`<div class="dot${i===cur?" a":""}" onclick="go(${i})"></div>`);
  h+=`<span class="pg">${cur+1} / ${S.length}</span>`;
  document.getElementById("nav").innerHTML=h;
}
buildSlide(0);
</script>
</body>
</html>
